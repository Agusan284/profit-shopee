<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanstore - Profit & BEP Tool Cloud Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #ee4d2d;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8f9fa;
            --text: #1e293b;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --orange: #ea580c;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            width: 98%;
            max-width: 1400px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .header-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .main-title {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .second-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-nav-top {
            background: #fff0ed;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-nav-top:hover { background: var(--primary); color: white; }

        .ads-container {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 5px 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        .input-ads {
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            font-weight: 600;
            width: 90px;
        }

        .ppn-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            color: #64748b;
        }

        .total-summary {
            background: #fff5f2;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #ffdbd3;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: right;
        }

        #grandTotalDisplay { color: var(--primary); font-size: 1.05rem; }
        .total-waiting { color: #64748b !important; font-size: 0.85rem !important; font-style: italic; }

        .table-container {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow-x: hidden; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; 
        }
        
        th { background-color: #f1f5f9; padding: 10px 4px; font-size: 0.75rem; font-weight: 700; text-align: left; border-bottom: 2px solid #cbd5e1; }
        td { padding: 5px 3px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }

        .col-no { width: 4%; min-width: 35px; text-align: center; font-weight: bold; font-size: 11px; }
        .col-order { width: 42%; }
        .col-money { width: 14%; } 
        .col-hasil { width: 16%; }
        .col-actions { width: 10%; min-width: 90px; text-align: center; }

        textarea, .input-money {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px;
            font-size: 12px; box-sizing: border-box; background: #fff;
        }
        textarea { resize: none; overflow: hidden; min-height: 35px; }

        .hasil-cell {
            font-weight: 700; text-align: right; padding: 6px; border-radius: 4px;
            background: #f8fafc; font-size: 11px; min-height: 32px;
            display: flex; align-items: center; justify-content: flex-end; box-sizing: border-box;
        }
        .untung { color: var(--success); background-color: #f0fdf4; border: 1px solid #dcfce7; }
        .minus { color: var(--danger); background-color: #fef2f2; border: 1px solid #fee2e2; }

        .btn-row-opt {
            padding: 4px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; color: white; margin: 1px;
        }
        .btn-row-update { background-color: var(--success); }
        .btn-row-delete { background-color: var(--danger); }
        .btn-row-local-del { background-color: #94a3b8; }

        #bep-view { display: none; }
        .bep-container { max-width: 500px; margin: 0 auto; padding: 20px 0; }
        .bep-card { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .bep-group { margin-bottom: 15px; }
        .bep-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #64748b; }
        .bep-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 16px; font-weight: 700; box-sizing: border-box; }
        .bep-result-box { text-align: center; padding: 20px; border-radius: 12px; background: linear-gradient(135deg, #ee4d2d 0%, #ff7d61 100%); color: white; }
        .bep-result-box .value { font-size: 32px; font-weight: 800; margin: 10px 0; }

        .controls { display: flex; gap: 6px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn-action { padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; border: none; color: white; flex: 1; min-width: 85px; transition: all 0.3s; }
        .btn-add { background: var(--blue); }
        .btn-import { background: var(--purple); }
        .btn-download { background: var(--success); }
        .btn-clear { background: #94a3b8; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; }
        #fileImport { display: none; }

        /* PERBAIKAN KHUSUS TAMPILAN HP */
        @media screen and (max-width: 768px) {
            .second-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .controls-group { flex-direction: column; align-items: stretch; }
            .ads-container { justify-content: space-between; }
            .total-summary { text-align: center; }
            
            /* Mengaktifkan scroll samping pada container tabel */
            .table-container { 
                overflow-x: auto; 
                -webkit-overflow-scrolling: touch; /* Biar scroll lebih smooth di iOS */
            }
            
            /* Memaksa table memiliki lebar minimum agar tidak gepeng dan memicu scrollbar aktif */
            table { 
                width: 100%;
                min-width: 750px; 
            }

            .col-no { width: 6%; }
            .col-order { width: 36%; }
            .col-money { width: 18%; } 
            .col-hasil { width: 20%; }
            .col-actions { width: 20%; }
        }
    </style>
</head>
<body>

<div class="card">
    <div id="profit-view">
        <div class="header-area">
            <h2 class="main-title">Laporan Profit Shopee (Cloud Pro)</h2>
            
            <div class="second-row">
               <div class="controls-group">

    <button class="btn-nav-top" onclick="switchView('bep')">
        BEP ROAS
    </button>

    <input
        type="date"
        id="reportDate"
        style="
            padding:8px;
            border:1px solid #cbd5e1;
            border-radius:6px;
            font-size:12px;
            background:white;
        "
    >

    <div class="ads-container">
                        <input type="text" id="biayaIklan" class="input-ads" oninput="formatAndCalcAds(this)" placeholder="Biaya Iklan">
                        <label class="ppn-toggle">
                            <input type="checkbox" id="usePpn" onchange="updateGrandTotal()" checked> +PPN 11%
                        </label>
                    </div>
                </div>
                
                <div class="total-summary">
                    Total Profit: <span id="grandTotalDisplay" class="total-waiting">Menunggu data terisi...</span>
                </div>
            </div>
        </div>
        
        <div class="table-container">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-no">ID</th>
                        <th class="col-order">Order</th>
                        <th class="col-money">HPP</th>
                        <th class="col-money">Jual</th>
                        <th class="col-hasil">Hasil</th>
                        <th class="col-actions">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr data-id="">
                        <td class="col-no">-</td>
                        <td><textarea oninput="autoGrow(this)" placeholder="Rincian..."></textarea></td>
                        <td><input type="text" class="input-money hpp" oninput="formatAndCalc(this)" placeholder="Rp 0"></td>
                        <td><input type="text" class="input-money jual" oninput="formatAndCalc(this)" placeholder="Rp 0"></td>
                        <td><div class="hasil-cell" data-value=""></div></td>
                        <td class="col-actions">
                            <button class="btn-row-opt btn-row-local-del" onclick="removeRowLocal(this)" title="Hapus dari layar saja">✕</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="controls">
            <button class="btn-action btn-add" onclick="addRow()">+ Baris</button>
            <button class="btn-action btn-import" onclick="document.getElementById('fileImport').click()">Import</button>
            <button class="btn-action" style="background: var(--orange);" onclick="simpanKeGoogleSheets(event)">Simpan Cloud</button>
            <button class="btn-action" style="background: var(--blue);" onclick="muatDariGoogleSheets(event)">Muat Cloud</button>
            <button class="btn-action btn-download" onclick="showFileNameModal()">Download</button>
            <button class="btn-action btn-clear" onclick="clearData()">Bersihkan</button>
        </div>
    </div>

    <div id="bep-view">
        <div class="header-area">
            <div class="title-group" style="display: flex; align-items: center; gap: 10px;">
                <button class="btn-nav-top" onclick="switchView('profit')">← Kembali</button>
                <h2 style="color: var(--purple); margin: 0; font-size: 1.25rem; font-weight: 800;">Kalkulator BEP ROAS</h2>
            </div>
        </div>
        <div class="bep-container">
            <div class="bep-card">
                <div class="bep-group">
                    <label>Harga Jual Produk (Per Item)</label>
                    <input type="text" id="bep-jual" class="bep-input" oninput="calcBEP(this)" placeholder="Rp 0">
                </div>
                <div class="bep-group">
                    <label>HPP</label>
                    <input type="text" id="bep-hpp" class="bep-input" oninput="calcBEP(this)" placeholder="Rp 0">
                </div>
            </div>
            <div class="bep-result-box">
                <h4>Break-Even Point (BEP) ROAS</h4>
                <div class="value" id="bep-result">0.00</div>
                <p style="font-size: 11px; margin: 0; opacity: 0.8;">Iklan Anda harus menghasilkan ROAS di atas angka ini agar untung.</p>
            </div>
        </div>
    </div>

    <input type="file" id="fileImport" accept=".xlsx, .xls" onchange="importExcel(this)">
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top: 0; font-size: 16px;">Simpan Laporan</h3>
        <label style="font-size: 11px; font-weight: 600;">Nama File:</label>
        <input type="text" id="fileNameInput" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:6px; box-sizing: border-box;" placeholder="Laporan_Profit">
        <select id="fileFormat" style="width:100%; padding:10px; margin-top:8px; border:1px solid #ddd; border-radius:6px; box-sizing: border-box;">
            <option value="excel">Excel (.xlsx)</option>
            <option value="pdf">PDF (.pdf)</option>
        </select>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-action btn-download" style="flex:2" onclick="processDownload()">Download</button>
            <button class="btn-action btn-clear" style="flex:1" onclick="document.getElementById('modal').style.display='none'">Batal</button>
        </div>
    </div>
</div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzU_YCn77055FBzWw_BiIu35AnoX9T2Htl524SPrBRsUPFidVeX4sMneCZdaAwkUec/exec';

    function switchView(view) {
        document.getElementById('profit-view').style.display = view === 'bep' ? 'none' : 'block';
        document.getElementById('bep-view').style.display = view === 'bep' ? 'block' : 'none';
    }

    function formatRupiah(angka) {
        let isMinus = false;
        if (typeof angka === 'string') {
            if (angka.startsWith('-')) isMinus = true;
            fancyRaw = angka.replace(/[^0-9]/g, '');
            angka = fancyRaw;
        } else {
            if (angka < 0) isMinus = true;
            angka = Math.abs(angka).toString();
        }
        if (!angka) return isMinus ? "-" : "";
        let formatted = new Intl.NumberFormat('id-ID').format(angka);
        return isMinus ? "-" + formatted : formatted;
    }

    function parseNumber(val) {
        if (!val) return 0;
        let clean = val.replace(/\./g, '').replace(/,/g, '.');
        return parseFloat(clean) || 0;
    }

    function autoGrow(element) {
        element.style.height = "35px";
        element.style.height = (element.scrollHeight) + "px";
    }

    function formatAndCalc(input) {
        let rawVal = input.value.replace(/\D/g, "");
        input.value = formatRupiah(rawVal);
        calculateRow(input.closest('tr'));
        updateGrandTotal();
    }

    function formatAndCalcAds(input) {
        let rawVal = input.value.replace(/\D/g, "");
        input.value = rawVal ? formatRupiah(rawVal) : "";
        updateGrandTotal();
    }

    function calculateRow(row) {
        const hppVal = row.querySelector('.hpp').value;
        const jualVal = row.querySelector('.jual').value;
        const hasilDiv = row.querySelector('.hasil-cell');

        if (hppVal === "" || jualVal === "") {
            hasilDiv.innerText = ""; hasilDiv.dataset.value = "";
            hasilDiv.className = 'hasil-cell'; return;
        }

        const hpp = parseNumber(hppVal);
        const jual = parseNumber(jualVal);
        const hasil = jual - hpp;
        hasilDiv.innerText = (hasil < 0 ? "-Rp " : "Rp ") + formatRupiah(Math.abs(hasil));
        hasilDiv.dataset.value = hasil;
        hasilDiv.className = 'hasil-cell ' + (hasil < 0 ? 'minus' : (hasil > 0 ? 'untung' : ''));
    }

    function updateGrandTotal() {
        const display = document.getElementById('grandTotalDisplay');
        let allFilled = true; let totalOmsetProfit = 0;
        const rows = document.querySelectorAll('#mainTable tbody tr');
        
        rows.forEach(row => {
            const hpp = row.querySelector('.hpp').value;
            const jual = row.querySelector('.jual').value;
            const hasilDiv = row.querySelector('.hasil-cell');
            if (hpp === "" || jual === "" || hasilDiv.dataset.value === "") { allFilled = false; } 
            else { totalOmsetProfit += parseFloat(hasilDiv.dataset.value || 0); }
        });

        if (!allFilled || rows.length === 0) {
            display.innerText = "Menunggu data terisi...";
            display.className = "total-waiting"; display.style.color = "#64748b"; return;
        }

        let biayaIklan = parseNumber(document.getElementById('biayaIklan').value);
        if (document.getElementById('usePpn').checked) biayaIklan *= 1.11;
        const finalTotal = totalOmsetProfit - biayaIklan;

        display.className = "";
        display.innerText = (finalTotal < 0 ? "-Rp " : "Rp ") + formatRupiah(Math.round(Math.abs(finalTotal)));
        display.style.color = finalTotal < 0 ? 'var(--danger)' : 'var(--primary)';
    }

    function addRow(data = {id: '', order: '', hpp: '', jual: ''}) {
        const tbody = document.querySelector('#mainTable tbody');
        const tr = document.createElement('tr');
        tr.dataset.id = data.id || '';
        
        let actionButtons = `<button class="btn-row-opt btn-row-local-del" onclick="removeRowLocal(this)" title="Hapus Lokal">✕</button>`;
        if(data.id) {
            actionButtons = `
                <button class="btn-row-opt btn-row-update" onclick="updateRowCloud(this)">Ubah</button>
                <button class="btn-row-opt btn-row-delete" onclick="deleteRowCloud(this)">Hapus</button>
            `;
        }

        tr.innerHTML = `
            <td class="col-no">${data.id || '-'}</td>
            <td><textarea oninput="autoGrow(this)" placeholder="Rincian...">${data.order}</textarea></td>
            <td><input type="text" class="input-money hpp" oninput="formatAndCalc(this)" placeholder="Rp 0" value="${data.hpp}"></td>
            <td><input type="text" class="input-money jual" oninput="formatAndCalc(this)" placeholder="Rp 0" value="${data.jual}"></td>
            <td><div class="hasil-cell" data-value=""></div></td>
            <td class="col-actions">${actionButtons}</td>
        `;
        tbody.appendChild(tr);
        if(data.order || data.hpp || data.jual) {
            autoGrow(tr.querySelector('textarea')); calculateRow(tr);
        }
        updateGrandTotal();
    }

    function removeRowLocal(btn) {
        if(confirm('Hapus baris ini dari layar? (Tidak menghapus data di Google Sheets)')) {
            btn.closest('tr').remove(); updateGrandTotal();
        }
    }

    function calcBEP(input) {
        let rawVal = input.value.replace(/\D/g, ""); input.value = formatRupiah(rawVal);
        const jual = parseNumber(document.getElementById('bep-jual').value);
        const hpp = parseNumber(document.getElementById('bep-hpp').value);
        const resultBox = document.getElementById('bep-result');
        if(jual > 0 && (jual - hpp) > 0) { resultBox.innerText = (jual / (jual - hpp)).toFixed(2); } 
        else { resultBox.innerText = "0.00"; }
    }

    function updateRowCloud(btn) {
        const row = btn.closest('tr');
        const id = row.dataset.id;
        const order = row.querySelector('textarea').value;
        const hpp = row.querySelector('.hpp').value;
        const jual = row.querySelector('.jual').value;
        const hasil = row.querySelector('.hasil-cell').innerText;

        if (!order || !hpp || !jual) { alert('Data tidak boleh kosong!'); return; }
        if(!confirm(`Apakah Anda yakin ingin mengubah Data ID ${id} di Google Sheets?`)) return;

        btn.innerText = "..."; btn.disabled = true;

        fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: "update_row",
                id: id,
                order: order,
                hpp: parseNumber(hpp),
                jual: parseNumber(jual),
                hasil: hasil
            })
        })
        .then(() => {
            alert(`Permintaan update ID ${id} dikirim ke Cloud! Silakan Muat Cloud kembali untuk sinkronisasi.`);
            btn.innerText = "Ubah"; btn.disabled = false;
            updateGrandTotal();
        })
        .catch(err => { alert('Gagal mengubah data.'); btn.innerText = "Ubah"; btn.disabled = false; });
    }

    function deleteRowCloud(btn) {
        const row = btn.closest('tr');
        const id = row.dataset.id;

        if(!confirm(`PERINGATAN!\nApakah Anda yakin ingin menghapus permanen Data ID ${id} dari Google Sheets?`)) return;

        btn.innerText = "..."; btn.disabled = true;

        fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "delete_row", id: id })
        })
        .then(() => {
            alert(`Permintaan hapus ID ${id} dikirim ke Cloud!`);
            row.remove();
            updateGrandTotal();
        })
        .catch(err => { alert('Gagal menghapus data.'); btn.innerText = "Hapus"; btn.disabled = false; });
    }

   function simpanKeGoogleSheets(event) {

    const reportDate =
        document.getElementById('reportDate').value;

    if (!reportDate) {
        alert("Pilih tanggal laporan terlebih dahulu.");
        return;
    }

    const rows =
        document.querySelectorAll('#mainTable tbody tr');

    let dataOrders = [];
    let allFilled = true;

    rows.forEach(row => {

        if (!row.dataset.id) {

            const order =
                row.querySelector('textarea').value;

            const hpp =
                row.querySelector('.hpp').value;

            const jual =
                row.querySelector('.jual').value;

            const hasil =
                row.querySelector('.hasil-cell').innerText;

            if (!order || !hpp || !jual) {

                allFilled = false;

            } else {

                dataOrders.push({
                    order: order,
                    hpp: parseNumber(hpp),
                    jual: parseNumber(jual),
                    hasil: hasil
                });

            }
        }
    });

    if (dataOrders.length === 0) {
        alert('Tidak ada data baru.');
        return;
    }

    if (!allFilled) {
        alert('Lengkapi seluruh data terlebih dahulu.');
        return;
    }

    const btn = event.target;

    btn.innerText = "Menyimpan...";
    btn.disabled = true;

    fetch(scriptUrl, {

        method: 'POST',
        mode: 'no-cors',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({

            action: "save_all",

            reportDate: reportDate,

            orders: dataOrders

        })

    })

    .then(() => {

        alert('Data berhasil dikirim.');

        btn.innerText = "Simpan Cloud";
        btn.disabled = false;

        setTimeout(() => {
            muatDariGoogleSheets(null);
        }, 1000);

    })

    .catch(() => {

        alert('Gagal menyimpan.');

        btn.innerText = "Simpan Cloud";
        btn.disabled = false;

    });
}

   function muatDariGoogleSheets(event) {

    const selectedDate =
        document.getElementById('reportDate').value;

    if (!selectedDate) {
        alert("Pilih tanggal terlebih dahulu.");
        return;
    }

    let btn = null;

    if (event && event.target) {

        btn = event.target;

        btn.innerText = "Memuat...";
        btn.disabled = true;
    }

    fetch(
        `${scriptUrl}?date=${selectedDate}`
    )

    .then(response => response.json())

    .then(res => {

        const tbody =
            document.querySelector('#mainTable tbody');

        tbody.innerHTML = '';

        if (
            Array.isArray(res) &&
            res.length > 0
        ) {

            res.forEach(item => {

                addRow({

                    id: item.id,

                    order: item.order,

                    hpp: formatRupiah(item.hpp.toString()),

                    jual: formatRupiah(item.jual.toString())

                });

            });

        } else {

            addRow();

        }

        updateGrandTotal();

        if (btn) {

            btn.innerText = "Muat Cloud";
            btn.disabled = false;
        }

    })

    .catch(() => {

        alert('Gagal mengambil data.');

        if (btn) {

            btn.innerText = "Muat Cloud";
            btn.disabled = false;
        }

    });
}

    function importExcel(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (jsonData.length > 1) {
                const tbody = document.querySelector('#mainTable tbody');
                if (tbody.rows.length === 1 && !tbody.rows[0].querySelector('textarea').value) tbody.innerHTML = '';
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (row.length > 0) addRow({ id:'', order: row[1] || '', hpp: row[2] ? formatRupiah(row[2].toString()) : '', jual: row[3] ? formatRupiah(row[3].toString()) : '' });
                }
            }
            input.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    function showFileNameModal() { document.getElementById('modal').style.display = 'flex'; }
    function processDownload() { const format = document.getElementById('fileFormat').value; format === 'excel' ? exportToExcel() : exportToPDF(); document.getElementById('modal').style.display = 'none'; }

    function exportToExcel() {
        const name = document.getElementById('fileNameInput').value || 'Laporan_Profit';
        const data = [['ID', 'Order', 'HPP', 'Jual', 'Hasil']];
        document.querySelectorAll('#mainTable tbody tr').forEach(tr => { data.push([tr.cells[0].innerText, tr.querySelector('textarea').value, parseNumber(tr.querySelector('.hpp').value), parseNumber(tr.querySelector('.jual').value), tr.querySelector('.hasil-cell').innerText]); });
        const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Laporan"); XLSX.writeFile(wb, `${name}.xlsx`);
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4');
        const name = document.getElementById('fileNameInput').value || 'Laporan_Profit';
        doc.text("Laporan Profit Shopee", 14, 20); doc.text("Total: " + document.getElementById('grandTotalDisplay').innerText, 14, 28);
        const body = [];
        document.querySelectorAll('#mainTable tbody tr').forEach(tr => { body.push([tr.cells[0].innerText, tr.querySelector('textarea').value, tr.querySelector('.hpp').value, tr.querySelector('.jual').value, tr.querySelector('.hasil-cell').innerText]); });
        doc.autoTable({ startY: 35, head: [['ID', 'Order', 'HPP', 'Jual', 'Hasil']], body: body, headStyles: { fillColor: [238, 77, 45] } });
        doc.save(`${name}.pdf`);
    }

    function clearData() { if(confirm('Hapus semua data di layar?')) location.reload(); }
window.onload = function() {

    const today = new Date();

    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');

    document.getElementById('reportDate').value =
        `${yyyy}-${mm}-${dd}`;

    updateGrandTotal();
};
</script>
